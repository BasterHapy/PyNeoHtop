name: Build PyNeoHtop

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            executable: main.bin
          - os: windows-latest
            platform: windows
            executable: main.exe
          - os: macos-latest
            platform: macos
            executable: main.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # 安装Xcode命令行工具
          xcode-select --install 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
          pip install nuitka ordered-set zstandard

      # --- 修改点 1: Linux 构建 ---
      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --onefile \
            --assume-yes-for-downloads \
            --enable-plugin=pywebview \
            --enable-plugin=pyside6 \
            --include-data-dir=static=static \
            --include-package=monitoring \
            --include-package=psutil \
            --include-package=cpuinfo \
            main.py

      # --- 修改点 2: Windows 构建 (添加 --assume-yes-for-downloads) ---
      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          nuitka --standalone --onefile --assume-yes-for-downloads ^
            --enable-plugin=pywebview ^
            --enable-plugin=pyside6 ^
            --include-data-dir=static=static ^
            --include-package=monitoring ^
            --include-package=psutil ^
            --include-package=cpuinfo ^
            main.py

      # --- 修改点 3: macOS 构建 (改为 --mode=app) ---
      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          nuitka --mode=app --assume-yes-for-downloads \
            --enable-plugin=pywebview \
            --enable-plugin=pyside6 \
            --include-data-dir=static=static \
            --include-package=monitoring \
            --include-package=psutil \
            --include-package=cpuinfo \
            main.py

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          mv main.bin artifacts/PyNeoHtop-${{ matrix.platform }}
          chmod +x artifacts/PyNeoHtop-${{ matrix.platform }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          mv main.exe artifacts/PyNeoHtop-${{ matrix.platform }}.exe

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          # --mode=app 必然生成 main.app 目录
          if [ -d "main.app" ]; then
            cd main.app
            zip -r ../artifacts/PyNeoHtop-${{ matrix.platform }}.zip .
            cd ..
          else
            echo "Error: main.app not found!"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PyNeoHtop-${{ matrix.platform }}
          path: artifacts/
          retention-days: 30

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 可选：通知构建状态
  notify:
    name: Notify Build Status
    needs: [build, create-release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Status
        run: |
          echo "Build completed with status: ${{ needs.build.result }}"
          if [ "${{ needs.create-release.result }}" != "skipped" ]; then
            echo "Release created with status: ${{ needs.create-release.result }}"
          fi
